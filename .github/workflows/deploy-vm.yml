name: Deploy Updated Service to Azure VM

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      version:
        required: true
        type: string
      branch:
        required: true
        type: string

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy updated service
        run: |
          set -e
          
          SERVICE="${{ inputs.service }}"
          VERSION="${{ inputs.version }}"
          BRANCH="${{ inputs.branch }}"
          
          echo "Deploying service: $SERVICE"
          echo "Branch: $BRANCH"
          echo "Version: $VERSION"
          
          cd /home/azureuser/webprotege/webprotege-deploy/
          
          echo "Checking out branch: $BRANCH"
          git fetch origin $BRANCH
          git checkout $BRANCH
          git pull origin $BRANCH
          
          echo "Rebuilding service: $SERVICE"
          sudo docker compose down $SERVICE
          sudo docker compose up -d --no-deps $SERVICE
          
          echo "Deployment finished successfully."

