name: Update Compose File

on:
  workflow_dispatch:
    inputs:
      service:
        required: true
        type: string
      version:
        required: true
        type: string
      branch:
        required: true
        type: string

  workflow_call:
    inputs:
      service:
        required: true
        type: string
      version:
        required: true
        type: string
      branch:
        required: true
        type: string

jobs:
  update-compose:
    runs-on: ubuntu-latest
    outputs:
      service: ${{ steps.set-vars.outputs.service }}
      version: ${{ steps.set-vars.outputs.version }}

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.branch }}
          token: ${{ secrets.PROTEGEPROJECT_BOT_APP_TOKEN }}

      - name: Print inputs for debugging
        run: |
          echo "Service: ${{ inputs.service }}"
          echo "Version: ${{ inputs.version }}"
          echo "Branch: ${{ inputs.branch }}"

      - name: Update docker-compose image tag
        id: update-compose
        run: |
          SERVICE="${{ inputs.service }}"
          VERSION="${{ inputs.version }}"
          FILE=docker-compose.yml
          
          echo "Updating service '$SERVICE' to version '$VERSION' in $FILE"
          
          cp "$FILE" "$FILE.bak"
          
          sed -i "s|\(image: protegeproject/$SERVICE:\)[^[:space:]]*|\1$VERSION|" "$FILE"
          
          echo "Result:"
          grep "image: protegeproject/$SERVICE" "$FILE" || echo "No matching image line found."
          
          if cmp -s "$FILE" "$FILE.bak"; then
            echo "No change made to docker-compose.yml."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "docker-compose.yml updated."
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.update-compose.outputs.changed == 'true'
        run: |
          git config user.name "webprotege-bot"
          git config user.email "webprotege@users.noreply.github.com"
          git add docker-compose.yml
          git commit -m "chore: bump ${{ inputs.service }} to ${{ inputs.version }}"
          git push origin ${{ inputs.branch }}

      - name: Set service/version outputs
        id: set-vars
        run: |
          echo "service=${{ inputs.service }}" >> $GITHUB_OUTPUT
          echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT

  notify-deploy:
    needs: update-compose
    uses: ./.github/workflows/deploy-vm.yml
    with:
      version: ${{ inputs.version }}
      service: ${{ inputs.service }}
      branch: ${{ inputs.branch }}
