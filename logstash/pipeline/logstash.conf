input {
  beats {
    port => 5044
  }
}

filter {
  if [container][name] {
    mutate {
      add_field => { "service_name" => "%{[container][name]}" }
    }
  }

  grok {
    match => {
      "message" => "%{TIMESTAMP_ISO8601:timestamp} \[%{DATA:thread}\] \[%{DATA:correlationId}\] %{LOGLEVEL:log_level} %{DATA:logger} - %{GREEDYDATA:log_message}"
    }
  }

  date {
    match => ["timestamp", "yyyy-MM-dd HH:mm:ss.SSS"]
    target => "@timestamp"
    timezone => "UTC"
    locale => "en"
  }

  mutate {
    remove_field => ["timestamp"]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    # Index pattern matches the ILM template pattern "webprotege-logs-*"
    # New indices will automatically have the ILM policy applied via the index template
    # ILM policy lifecycle: Hot (0-7 days) -> Warm (7-30 days) -> Cold (30-90 days) -> Delete (90+ days)
    index => "webprotege-logs-%{+YYYY.MM.dd}"
  }
} 